<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 背景（沙漠色） -->
  <rect width="512" height="512" fill="#d2b48c" rx="32" ry="32"/>
  
  <!-- 地平线 -->
  <rect x="0" y="320" width="512" height="192" fill="#c19a6b"/>
  
  <!-- 摩天大楼（方形风格） -->
  <!-- 哈利法塔风格建筑 -->
  <rect x="230" y="120" width="52" height="200" fill="#ffffff" rx="4" ry="4"/>
  <rect x="240" y="80" width="32" height="40" fill="#ffffff" rx="2" ry="2"/>
  
  <!-- 其他建筑 -->
  <rect x="160" y="180" width="40" height="140" fill="#f4d03f" rx="4" ry="4"/>
  <rect x="320" y="160" width="48" height="160" fill="#3498db" rx="4" ry="4"/>
  <rect x="100" y="220" width="32" height="100" fill="#9b59b6" rx="4" ry="4"/>
  <rect x="380" y="200" width="36" height="120" fill="#e74c3c" rx="4" ry="4"/>
  
  <!-- 金色装饰元素 -->
  <rect x="240" y="120" width="12" height="200" fill="#f4d03f"/>
  <rect x="260" y="120" width="12" height="200" fill="#f4d03f"/>
  
  <!-- 蓝色水池/海洋元素 -->
  <rect x="0" y="380" width="512" height="132" fill="#3498db"/>
  
  <!-- 几何装饰元素 -->
  <rect x="250" y="340" width="12" height="40" fill="#f4d03f" rx="2" ry="2"/>
  <rect x="280" y="350" width="16" height="30" fill="#3498db" rx="2" ry="2"/>
  <rect x="220" y="360" width="10" height="20" fill="#ffffff" rx="2" ry="2"/>
  
  <!-- 太阳 -->
  <rect x="420" y="60" width="40" height="40" fill="#f4d03f" rx="8" ry="8"/>
</svg>