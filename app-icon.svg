<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- 背景方形 -->
  <rect width="512" height="512" fill="url(#bg-gradient)" rx="32" ry="32"/>
  
  <!-- 地球网格 -->
  <g opacity="0.1">
    <circle cx="256" cy="256" r="180" stroke="#ffffff" stroke-width="2" fill="none"/>
    <circle cx="256" cy="256" r="120" stroke="#ffffff" stroke-width="2" fill="none"/>
    <circle cx="256" cy="256" r="60" stroke="#ffffff" stroke-width="2" fill="none"/>
    <line x1="76" y1="256" x2="436" y2="256" stroke="#ffffff" stroke-width="2"/>
    <line x1="256" y1="76" x2="256" y2="436" stroke="#ffffff" stroke-width="2"/>
  </g>
  
  <!-- 时间线 -->
  <line x1="100" y1="256" x2="412" y2="256" stroke="#3498db" stroke-width="8" stroke-linecap="round"/>
  <circle cx="140" cy="256" r="8" fill="#3498db"/>
  <circle cx="256" cy="256" r="8" fill="#3498db"/>
  <circle cx="372" cy="256" r="8" fill="#3498db"/>
  
  <!-- 地图标记 -->
  <g filter="url(#glow)">
    <path d="M256 160c-16 0-29 13-29 29v126c0 16 13 29 29 29s29-13 29-29V189c0-16-13-29-29-29z" fill="#e74c3c"/>
    <circle cx="256" cy="189" r="12" fill="#ffffff"/>
  </g>
  
  <!-- 装饰元素 -->
  <path d="M180 200L220 160M332 200L292 160M180 312L220 352M332 312L292 352" stroke="#3498db" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
</svg>